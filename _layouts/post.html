---
layout: default
---
<article class="post">
  <p class="post-meta">
    <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>{% if page.week %} &middot; Week {{ page.week }}{% endif %}
  </p>

  <h1 class="post-title">{{ page.title }}</h1>

  <hr class="rule">

  <div class="post-content">
    {{ content }}
  </div>

  <hr class="rule">

  <nav class="post-nav">
    {% if page.previous.url %}
      <a class="post-nav-prev" href="{{ page.previous.url | relative_url }}">&larr; Previous</a>
    {% else %}
      <span></span>
    {% endif %}
    {% if page.next.url %}
      <a class="post-nav-next" href="{{ page.next.url | relative_url }}">Next &rarr;</a>
    {% else %}
      <span></span>
    {% endif %}
  </nav>
</article>
